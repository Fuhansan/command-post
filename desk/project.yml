name: VibeNotch
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: NO
packages:
  DynamicNotchKit:
    path: Vendor/DynamicNotchKit
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
targets:
  VibeNotch:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: VibeNotch
    info:
      path: VibeNotch/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: VibeNotch
        CFBundleDisplayName: VibeNotch
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        NSHumanReadableCopyright: ""
        # 手机「新建会话」用 AppleScript 控制 Terminal.app 开窗口跑命令(自动化权限)
        NSAppleEventsUsageDescription: "VibeNotch 需要控制终端来从手机端新建会话(打开终端运行命令)。"
        # 只保留 NSAllowsArbitraryLoads:同时写 NSAllowsLocalNetworking 会让
        # macOS 忽略 ArbitraryLoads、只认 LocalNetworking(仅放行本地网络),
        # 导致公网 VPS 的明文被 ATS 拦(-1022)。与 iOS 端保持一致。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.VibeNotch
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: DynamicNotchKit
      - package: MarkdownUI
        product: MarkdownUI
