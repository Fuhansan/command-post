# 外置配置:放在 coding-server.jar 同目录,Spring Boot 启动时自动加载并
# 覆盖 jar 内置配置 —— 改这里不用重新打包。
spring.application.name=coding-server

# HTTP(登录 REST + 图片上传/下载)
server.port=8080

# Netty 中转 WebSocket(iOS 客户端 + 电脑端 Agent 都连这里)
relay.port=8090
relay.path=/ws

# 单个上传请求体上限(图片走 HTTP 上传,留足余量)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Google 登录用的 client-id(换成你自己的;不改也能用现有的)
auth.google.client-id=575013344055-q59cve71hadhq71ruetau131aq3vh5nq.apps.googleusercontent.com

# ── 邮件发送(忘记密码验证码)──────────────────────────────
# 在这里填发件邮箱凭据(改完重启服务即可,不用重新打包)。
# Gmail:password 用「应用专用密码」(Google 账号开两步验证后生成),不是登录密码。
#   ⚠️ 国内 VPS 连 smtp.gmail.com 常超时;若发不出,把 host 改成 smtp.qq.com
#      或 smtp.163.com(端口改 465),password 用对应邮箱的「授权码」。
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=你的发件邮箱@gmail.com
spring.mail.password=你的应用专用密码
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
