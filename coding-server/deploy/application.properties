# 外置配置:放在 coding-server.jar 同目录,Spring Boot 启动时自动加载并
# 覆盖 jar 内置配置 —— 改这里不用重新打包。
spring.application.name=coding-server

# HTTP(登录 REST + 图片上传/下载)
server.port=8080

# Netty 中转 WebSocket(iOS 客户端 + 电脑端 Agent 都连这里)
relay.port=8090
relay.path=/ws

# 单个上传请求体上限(图片走 HTTP 上传,留足余量)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Google 登录用的 client-id(换成你自己的;不改也能用现有的)
auth.google.client-id=575013344055-q59cve71hadhq71ruetau131aq3vh5nq.apps.googleusercontent.com

# ── 邮件发送(注册 / 忘记密码 / 验证码登录)────────────────
# 发件方用 163 邮箱(国内 VPS 直连;Gmail SMTP 在国内连不上)。
# username = 发件 163 邮箱;password = 163 邮箱「授权码」(不是登录密码):
#   163邮箱网页版 → 设置 → POP3/SMTP/IMAP → 开启「SMTP服务」→ 生成授权码,填到下面。
# 想换 QQ:host 改 smtp.qq.com,password 用 QQ 授权码。
spring.mail.host=smtp.163.com
spring.mail.port=465
spring.mail.username=你的163邮箱@163.com
spring.mail.password=你的163邮箱授权码
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
