spring.application.name=coding-server

# Spring MVC（Tomcat）—— 预留给未来业务 REST（账号、设备授权、上传换 URL 等）
server.port=8080

# Netty 中转 WebSocket —— iOS Client / Agent 都连这里（PROTOCOL §2 传输层）
relay.port=8090
relay.path=/ws
auth.google.client-id=575013344055-q59cve71hadhq71ruetau131aq3vh5nq.apps.googleusercontent.com

# ── 邮件发送(注册 / 忘记密码 验证码)──────────────────────
# 默认 QQ 邮箱 SMTP(国内服务器直连最稳;Gmail 的 smtp.gmail.com 在国内 VPS 连不上)。
# username = 发件 QQ 邮箱;password = QQ 邮箱「授权码」(不是 QQ 密码):
#   QQ邮箱 → 设置 → 账号 → POP3/IMAP/SMTP → 开启「SMTP服务」→ 生成授权码。
# username/password 留空 → 真正生效的值放到 jar 同目录的外置 application.properties。
# 想换 163:host=smtp.163.com,其余相同(同为 465/SSL,password 用 163 授权码)。
spring.mail.host=smtp.qq.com
spring.mail.port=465
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
