spring.application.name=coding-server

# Spring MVC（Tomcat）—— 预留给未来业务 REST（账号、设备授权、上传换 URL 等）
server.port=8080

# Netty 中转 WebSocket —— iOS Client / Agent 都连这里（PROTOCOL §2 传输层）
relay.port=8090
relay.path=/ws
auth.google.client-id=575013344055-q59cve71hadhq71ruetau131aq3vh5nq.apps.googleusercontent.com

# ── 邮件发送(忘记密码验证码)──────────────────────────────
# 默认 Gmail SMTP。username/password 留空 → 真正生效的值放到 jar 同目录的
# 外置 application.properties 里填(改配置不用重新打包)。
# Gmail 的 password 必须用「应用专用密码」(开启两步验证后在 Google 账号生成),
# 不是 Gmail 登录密码。注意:国内服务器连 smtp.gmail.com 可能超时,届时把
# spring.mail.host 改成 smtp.qq.com / smtp.163.com 等即可(端口同 465/SSL)。
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
